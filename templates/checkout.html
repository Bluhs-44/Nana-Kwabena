<!doctype html>
<title>Checkout</title>
<h1>Checkout</h1>
{% if items %}
<form method="post">
  <table>
    <tr><th>Product</th><th>Quantity</th><th>Price</th></tr>
    {% for item in items %}
    <tr>
      <td>{{ item.name }}</td>
      <td>{{ item.quantity }}</td>
      <td>${{ '%.2f' % (item.price * item.quantity) }}</td>
    </tr>
    {% endfor %}
  </table>
  <p>Total: ${{ '%.2f' % total }}</p>
  <!-- Payment fields would go here -->
  <button type="submit">Complete Purchase</button>
</form>
{% else %}
<p>Your cart is empty.</p>
{% endif %}
<a href="{{ url_for('view_cart') }}">Back to Cart</a>
