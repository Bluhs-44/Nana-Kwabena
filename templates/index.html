<!doctype html>
<title>Simple Shop</title>
<h1>Products</h1>
<ul>
  {% for product in products %}
  <li>
    <a href="{{ url_for('product_detail', pid=product.id) }}">{{ product.name }}</a>
    - ${{ '%.2f' % product.price }}
    <form action="{{ url_for('add_to_cart', pid=product.id) }}" method="post" style="display:inline;">
      <button type="submit">Add to Cart</button>
    </form>
  </li>
  {% endfor %}
</ul>
<a href="{{ url_for('view_cart') }}">View Cart</a>
